plugins:
  - rubocop-rake
  - rubocop-minitest

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.1
  Exclude:
    - vendor/**/*
    - gemfiles/**/*
  SuggestExtensions: false

Metrics/ClassLength:
  Max: 550
Metrics/AbcSize:
  Max: 80
Metrics/CyclomaticComplexity:
  Max: 25
Metrics/MethodLength:
  Max: 80
  CountAsOne:
    - array
    - hash
    - heredoc
Metrics/ModuleLength:
  Max: 550

Minitest/MultipleAssertions:
  Enabled: false
